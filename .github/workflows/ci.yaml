name: CI

on:
  push:
    branches:
      - main
  pull_request_target:
    # Fork PRs are gated by GitHub's fork-workflow approval before this starts.
    # Run from the base repository context, then explicitly check out the PR head
    # so the shared-image CI pipeline exercises the contributor's code.
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  # Internal CI tag used only to share prebuilt images between CI jobs.
  CI_TAG: ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
  # Buildcache ref used by docker/build-push-action.
  # For pushes to main and workflow_dispatch/workflow_call (trusted contexts),
  # read/write the shared ':buildcache' tag.
  # For pull_request_target (which checks out untrusted PR code), scope the
  # cache to a per-PR tag so a malicious PR cannot poison the cache that
  # subsequent builds on main consume. Fork PRs still get cache-from on the
  # trusted ':buildcache' for speed, but cache-to writes only to the
  # per-PR scoped tag.
  BUILDCACHE_SCOPE: ${{ github.event.pull_request.number && format('buildcache-pr-{0}', github.event.pull_request.number) || 'buildcache' }}

jobs:
  # ==========================================================================
  # Stage 1: Build all Docker images (parallel matrix)
  # Push to GHCR with CI-specific tag for reuse by integration tests
  # ==========================================================================
  build-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: directory-server
            dockerfile: ./directory_server/Dockerfile
            image: directory-server
            target: production
            tag_suffix: ""
          - name: directory-server-debug
            dockerfile: ./directory_server/Dockerfile
            image: directory-server-debug
            target: debug
            tag_suffix: ""
          - name: orderbook-watcher
            dockerfile: ./orderbook_watcher/Dockerfile
            image: orderbook-watcher
            target: ""
            tag_suffix: ""
          - name: maker
            dockerfile: ./maker/Dockerfile
            image: maker
            target: ""
            tag_suffix: ""
          - name: taker
            dockerfile: ./taker/Dockerfile
            image: taker
            target: ""
            tag_suffix: ""
          - name: jmwalletd
            dockerfile: ./jmwalletd/Dockerfile
            image: jmwalletd
            target: "jmwalletd"
            tag_suffix: ""

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Get Git commit timestamp for reproducible builds
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target || '' }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${{ env.CI_TAG }}${{ matrix.tag_suffix }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:latest
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${{ env.BUILDCACHE_SCOPE }},mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
            JOINMARKET_BUILD_COMMIT=${{ github.sha }}
            JOINMARKET_BUILD_REF=${{ github.ref_name }}
        env:
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}

  # ==========================================================================
  # Stage 2a: Unit tests (parallel matrix across Python versions)
  # Runs in parallel with image builds for faster feedback
  # Excludes tests marked with @pytest.mark.docker (those run in integration tests)
  # ==========================================================================
  complexipy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install complexipy
        run: pip install complexipy==5.5.0

      - name: Run complexity check
        run: complexipy . --failed --suggest-refactors

  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: ${{ matrix.python-version }}
          components: jmcore,jmwallet,directory_server,orderbook_watcher,maker,taker,jmwalletd,tumbler
          install-dev: 'true'

      - name: Run unit tests
        run: |
          pytest -c pytest.ini jmcore jmwallet directory_server orderbook_watcher maker taker jmwalletd tumbler \
            --junitxml=junit/unit-tests.xml \
            --cov=jmcore --cov=jmwallet --cov=directory_server --cov=orderbook_watcher --cov=maker --cov=taker --cov=jmwalletd --cov=tumbler \
            --cov-report=term-missing --cov-report=xml --cov-report=html \
            -v --fail-on-skip

      - name: Run repo-root tests
        # Tests under the top-level tests/ directory (TUI, release scripts,
        # changelog/commit helpers, flatpak, finalize-bond-psbt) cannot be
        # combined into the previous invocation because each component ships
        # its own tests/ package and the duplicated module names trip
        # pytest's collector. Run them as a separate invocation. Docker- and
        # browser-marked tests under tests/e2e and tests/playwright are
        # excluded by the default '-m "not docker"' filter in pytest.ini.
        run: |
          pytest -c pytest.ini tests \
            --ignore=tests/playwright \
            --junitxml=junit/root-tests.xml \
            --cov=scripts --cov=jmcore \
            --cov-report=term-missing --cov-report=xml:coverage-root.xml \
            -v --fail-on-skip

      - name: Rename coverage file
        if: always()
        run: mv coverage.xml coverage-unit-py${{ matrix.python-version }}.xml

      - uses: actions/upload-artifact@v7
        with:
          name: unit-test-results-py${{ matrix.python-version }}
          path: |
            junit/unit-tests.xml
            junit/root-tests.xml
            coverage-unit-py${{ matrix.python-version }}.xml
            coverage-root.xml
            htmlcov/
        if: always()

  # ==========================================================================
  # Stage 2b: install.sh smoke tests across operating systems
  # Linux (container): real Docker install in vanilla debian:stable-slim +
  # ubuntu:24.04, verifies the script bootstraps curl/gnupg/sudo and that
  # jm-wallet --help runs in the resulting venv.
  # Linux/macOS (native): real install + Tor + signet orderbook fetch over
  # Tor against the public signet directory nodes, proving the installed
  # software can speak the JoinMarket protocol end to end.
  # Windows (native): documented pip-based install + Tor + same signet
  # orderbook smoke. install.sh itself is only --help/-n linted on Windows
  # because the script targets POSIX shells with apt/brew.
  # ==========================================================================
  test-install-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest pytest-timeout pytest-cov
      - name: Run install.sh smoke tests in Debian and Ubuntu containers
        env:
          # Install from the workflow ref so the smoke exercises the code
          # under review. Without this, install.sh would clone main (which
          # may not contain the proposed changes).
          JMNG_INSTALL_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: pytest -c pytest.ini tests/test_install_e2e.py -m docker -v -s --timeout=900 --no-cov

  test-install-linux-native:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Real install via install.sh (this branch HEAD, unsigned)
        # Install from the workflow ref so install-time CI exercises the
        # exact code under review. The release tarball + GPG verification
        # path is exercised by manual operator installs at tag time; here
        # we pass --skip-verify because branch HEAD commits are unsigned.
        env:
          JMNG_INSTALL_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash install.sh -y --skip-tor --skip-verify --taker --version "$JMNG_INSTALL_REF"
      - name: Install Tor and start it
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          sudo systemctl start tor || sudo service tor start
          for i in $(seq 1 60); do
            if nc -z 127.0.0.1 9050; then
              echo "Tor SOCKS5 ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Tor SOCKS5 did not become reachable" >&2
          sudo systemctl status tor || true
          exit 1
      - name: Fetch signet orderbook over Tor
        # Validates Tor, the installed binary, and the JoinMarket directory
        # protocol end-to-end. Exits 1 if no directory could be reached
        # (hard failure: install is broken), exits 0 with a WARNING if
        # connected but got fewer than --min-offers (signet makers may be
        # temporarily offline -- outside our control).
        run: |
          set -euo pipefail
          PYBIN="$HOME/.joinmarket-ng/venv/bin/python"
          if [ ! -x "$PYBIN" ]; then
            echo "Expected venv python at $PYBIN" >&2
            ls -la "$HOME/.joinmarket-ng" || true
            exit 1
          fi
          "$PYBIN" scripts/check_signet_orderbook.py --min-offers 1

  test-install-macos:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Lint script (bash -n)
        run: bash -n install.sh
      - name: install.sh --help works on macOS bash
        # macOS ships bash 3.2; the script must remain compatible with it
        # for ``--help`` to succeed even though full installs require a
        # newer bash from Homebrew.
        run: bash install.sh --help
      - name: Real install via install.sh (this branch HEAD, unsigned)
        # Exercises the brew prerequisite path and source install from the
        # workflow ref so install-time CI runs the code under review. The
        # release tarball + GPG verification path is exercised by manual
        # operator installs at tag time; here we pass --skip-verify because
        # branch HEAD commits are unsigned. macOS ships bash 3.2; install.sh
        # upgrades itself via brew if needed.
        env:
          JMNG_INSTALL_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash install.sh -y --skip-tor --skip-verify --taker --version "$JMNG_INSTALL_REF"
      - name: Install Tor via Homebrew and start it
        run: |
          brew install tor
          brew services start tor
          # Wait for Tor to bootstrap; SOCKS port becomes reachable when ready.
          for i in $(seq 1 60); do
            if nc -z 127.0.0.1 9050; then
              echo "Tor SOCKS5 ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Tor SOCKS5 did not become reachable" >&2
          brew services list || true
          exit 1
      - name: Fetch signet orderbook over Tor
        run: |
          set -euo pipefail
          PYBIN="$HOME/.joinmarket-ng/venv/bin/python"
          if [ ! -x "$PYBIN" ]; then
            echo "Expected venv python at $PYBIN" >&2
            ls -la "$HOME/.joinmarket-ng" || true
            exit 1
          fi
          "$PYBIN" scripts/check_signet_orderbook.py --min-offers 1

  test-install-windows:
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Lint script (bash -n)
        run: bash -n install.sh
      - name: install.sh --help works under git-bash
        run: bash install.sh --help
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Manual pip install (Windows has no install.sh path)
        # Windows users follow docs/install/windows.md: install Python +
        # tor + pip install joinmarket-ng. This exercises that path.
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # Install from source in editable mode mirrors the documented
          # Windows quick start.
          pip install ./jmcore ./taker ./jmwallet
      - name: Install Tor, start it, and fetch the signet orderbook
        shell: pwsh
        # Chocolatey's tor package is unreliable across runner images, so
        # we fetch the Tor Project's official Expert Bundle directly. The
        # bundle ships tor.exe under tor/ and geoip files under data/.
        # Pass configuration through a torrc file rather than command-line
        # flags: PowerShell's Start-Process -ArgumentList re-splits string
        # arguments on spaces (so "--Log","notice file $log" reaches tor
        # as four tokens and fails with "Unknown option 'file'").
        #
        # Tor must run as a child of this same step. GitHub Actions kills
        # any background processes when a step ends, so we cannot bootstrap
        # tor in one step and exercise it in the next; macOS/Linux jobs get
        # around this with systemctl / brew services which detach tor from
        # the step's process tree, but Windows lacks an equivalent on the
        # hosted runner without elevation. Keeping the fetch in this step
        # also matches what a real user would do (launch tor, then taker).
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://archive.torproject.org/tor-package-archive/torbrowser/13.5.7/tor-expert-bundle-windows-x86_64-13.5.7.tar.gz"
          $work = Join-Path $env:RUNNER_TEMP "tor"
          $dataDir = Join-Path $work "datadir"
          New-Item -ItemType Directory -Force -Path $work | Out-Null
          New-Item -ItemType Directory -Force -Path $dataDir | Out-Null
          $archive = Join-Path $work "tor.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile $archive
          tar -xzf $archive -C $work
          $torExe = Get-ChildItem -Path $work -Recurse -Filter "tor.exe" | Select-Object -First 1
          if (-not $torExe) { throw "tor.exe not found in expert bundle" }
          $geoip = Get-ChildItem -Path $work -Recurse -Filter "geoip" | Where-Object { -not $_.PSIsContainer } | Select-Object -First 1
          $geoip6 = Get-ChildItem -Path $work -Recurse -Filter "geoip6" | Where-Object { -not $_.PSIsContainer } | Select-Object -First 1
          $log = Join-Path $work "tor.log"
          $stdoutLog = Join-Path $work "tor.stdout.log"
          $stderrLog = Join-Path $work "tor.stderr.log"
          $torrc = Join-Path $work "torrc"
          $torrcLines = @(
            "SocksPort 9050",
            "DataDirectory $($dataDir -replace '\\','/')",
            "Log notice file $($log -replace '\\','/')"
          )
          if ($geoip)  { $torrcLines += "GeoIPFile $($geoip.FullName -replace '\\','/')" }
          if ($geoip6) { $torrcLines += "GeoIPv6File $($geoip6.FullName -replace '\\','/')" }
          $torrcLines | Set-Content -Path $torrc -Encoding ASCII
          Write-Host "::group::torrc"
          Get-Content $torrc | Write-Host
          Write-Host "::endgroup::"
          $proc = Start-Process -FilePath $torExe.FullName `
            -ArgumentList @("-f", $torrc) `
            -WindowStyle Hidden -PassThru `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError  $stderrLog
          Write-Host "Tor pid: $($proc.Id)"
          # Wait for tor to write "Bootstrapped 100" to the log; SOCKS
          # readiness alone is not enough for onion circuits.
          $deadline = (Get-Date).AddSeconds(180)
          $bootstrapped = $false
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Seconds 3
            if ($proc.HasExited) {
              Write-Host "Tor exited early with code $($proc.ExitCode)"
              break
            }
            if (Test-Path $log) {
              $content = Get-Content $log -Raw -ErrorAction SilentlyContinue
              if ($content -match "Bootstrapped 100") {
                $bootstrapped = $true
                Write-Host "Tor bootstrapped"
                break
              }
            }
          }
          if (-not $bootstrapped) {
            Write-Host "::group::tor.log"
            if (Test-Path $log) { Get-Content $log } else { Write-Host "(missing)" }
            Write-Host "::endgroup::"
            Write-Host "::group::tor.stdout.log"
            if (Test-Path $stdoutLog) { Get-Content $stdoutLog } else { Write-Host "(missing)" }
            Write-Host "::endgroup::"
            Write-Host "::group::tor.stderr.log"
            if (Test-Path $stderrLog) { Get-Content $stderrLog } else { Write-Host "(missing)" }
            Write-Host "::endgroup::"
            Write-Error "Tor did not bootstrap in time"
            exit 1
          }
          try {
            python scripts/check_signet_orderbook.py --min-offers 1
          } finally {
            # Stop tor so the runner cleans up promptly; ignore errors
            # because the process may already be gone if the script killed
            # it through some side effect.
            try { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue } catch { }
          }

  # ==========================================================================
  # Stage 3: Integration tests (require Docker infrastructure)
  # Uses pre-built images from build-images where needed
  # Also runs docker-marked tests from jmwallet and maker
  # ==========================================================================
  test-e2e:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    env:
      # Use pre-built images from CI
      DIRECTORY_SERVER_IMAGE: ghcr.io/${{ github.repository }}/directory-server:ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
      ORDERBOOK_WATCHER_IMAGE: ghcr.io/${{ github.repository }}/orderbook-watcher:ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
      MAKER_IMAGE: ghcr.io/${{ github.repository }}/maker:ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
      TAKER_IMAGE: ghcr.io/${{ github.repository }}/taker:ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
      JMWALLETD_IMAGE: ghcr.io/${{ github.repository }}/jmwalletd:ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: ./.github/actions/setup-python-deps
        with:
          components: jmcore,jmwallet,directory_server,orderbook_watcher,maker,taker,jmwalletd,tumbler
          install-dev: 'true'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built images
        run: |
          docker pull $DIRECTORY_SERVER_IMAGE
          docker pull $ORDERBOOK_WATCHER_IMAGE
          docker pull $MAKER_IMAGE
          docker pull $TAKER_IMAGE
          docker pull $JMWALLETD_IMAGE

      - name: "Start e2e services"
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: |
          # Start with pre-built images (env vars override build)
          docker compose --profile e2e up -d

          .github/scripts/wait-for-service.sh "Bitcoin" \
            "docker compose exec -T bitcoin bitcoin-cli -chain=regtest -rpcport=18443 -rpcuser=test -rpcpassword=test getblockchaininfo" \
            60 1

          .github/scripts/wait-for-service.sh "Directory Server" \
            "nc -z localhost 5222" \
            30 1

          .github/scripts/wait-for-service.sh "jmwalletd" \
            "curl -skf https://127.0.0.1:28183/api/v1/getinfo" \
            60 2

          echo "Waiting for makers to publish offers to orderbook watcher..."
          for i in $(seq 1 90); do
            n_offers=$(curl -sf http://127.0.0.1:8080/orderbook.json 2>/dev/null \
              | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('offers', [])))" 2>/dev/null || echo 0)
            if [ "${n_offers:-0}" -ge 2 ]; then
              echo "Orderbook has ${n_offers} offers - makers ready"
              break
            fi
            sleep 2
          done

          echo "E2E services ready!"

      - name: Run e2e tests (our implementation only)
        env:
          BITCOIN_RPC_URL: http://127.0.0.1:18443
          BITCOIN_RPC_USER: test
          BITCOIN_RPC_PASSWORD: test
          OBWATCH_URL: http://127.0.0.1:8080
        run: |
          pytest -c pytest.ini -m "e2e and not tumbler_e2e" --junitxml=junit/test-results.xml \
            --cov --cov-report=term-missing --cov-report=xml \
            -v -s --timeout=300 --reruns=1 --reruns-delay=10 --fail-on-skip

      - name: Show logs
        if: always()
        run: |
          echo "=== Docker compose status ==="
          docker compose --profile e2e ps
          echo ""
          echo "=== Bitcoin logs ==="
          docker compose logs bitcoin --tail=30
          echo ""
          echo "=== Directory logs ==="
          docker compose logs directory --tail=30
          echo ""
          echo "=== Maker1 logs ==="
          docker compose logs maker1 --tail=50
          echo ""
          echo "=== Maker2 logs ==="
          docker compose logs maker2 --tail=50
          echo ""
          echo "=== jmwalletd logs ==="
          docker compose logs jmwalletd --tail=50

      - name: Cleanup
        if: always()
        run: docker compose --profile e2e down -v

      - uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: |
            junit/test-results.xml
            coverage.xml
        if: always()

  test-tumbler:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    env:
      # Use pre-built images from CI
      DIRECTORY_SERVER_IMAGE: ghcr.io/${{ github.repository }}/directory-server:ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
      ORDERBOOK_WATCHER_IMAGE: ghcr.io/${{ github.repository }}/orderbook-watcher:ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
      MAKER_IMAGE: ghcr.io/${{ github.repository }}/maker:ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
      TAKER_IMAGE: ghcr.io/${{ github.repository }}/taker:ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
      JMWALLETD_IMAGE: ghcr.io/${{ github.repository }}/jmwalletd:ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: ./.github/actions/setup-python-deps
        with:
          components: jmcore,jmwallet,directory_server,orderbook_watcher,maker,taker,jmwalletd,tumbler
          install-dev: 'true'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built images
        run: |
          docker pull $DIRECTORY_SERVER_IMAGE
          docker pull $ORDERBOOK_WATCHER_IMAGE
          docker pull $MAKER_IMAGE
          docker pull $TAKER_IMAGE
          docker pull $JMWALLETD_IMAGE

      - name: "Start e2e services"
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: |
          # Start with pre-built images (env vars override build)
          docker compose --profile e2e up -d

          .github/scripts/wait-for-service.sh "Bitcoin" \
            "docker compose exec -T bitcoin bitcoin-cli -chain=regtest -rpcport=18443 -rpcuser=test -rpcpassword=test getblockchaininfo" \
            60 1

          .github/scripts/wait-for-service.sh "Directory Server" \
            "nc -z localhost 5222" \
            30 1

          .github/scripts/wait-for-service.sh "jmwalletd" \
            "curl -skf https://127.0.0.1:28183/api/v1/getinfo" \
            60 2

          echo "Waiting for makers to publish offers to orderbook watcher..."
          for i in $(seq 1 90); do
            n_offers=$(curl -sf http://127.0.0.1:8080/orderbook.json 2>/dev/null \
              | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('offers', [])))" 2>/dev/null || echo 0)
            if [ "${n_offers:-0}" -ge 2 ]; then
              echo "Orderbook has ${n_offers} offers - makers ready"
              break
            fi
            sleep 2
          done

          echo "E2E services ready!"

      - name: Run tumbler e2e tests
        env:
          BITCOIN_RPC_URL: http://127.0.0.1:18443
          BITCOIN_RPC_USER: test
          BITCOIN_RPC_PASSWORD: test
          OBWATCH_URL: http://127.0.0.1:8080
        run: |
          pytest -c pytest.ini -m tumbler_e2e --junitxml=junit/test-results.xml \
            --cov --cov-report=term-missing --cov-report=xml \
            -v -s --timeout=600 --reruns=1 --reruns-delay=10 --fail-on-skip

      - name: Show logs
        if: always()
        run: |
          echo "=== Docker compose status ==="
          docker compose --profile e2e ps
          echo ""
          echo "=== Bitcoin logs ==="
          docker compose logs bitcoin --tail=30
          echo ""
          echo "=== Directory logs ==="
          docker compose logs directory --tail=30
          echo ""
          echo "=== Maker1 logs ==="
          docker compose logs maker1 --tail=100
          echo ""
          echo "=== Maker2 logs ==="
          docker compose logs maker2 --tail=100
          echo ""
          echo "=== Maker3 logs ==="
          docker compose logs maker3 --tail=100
          echo ""
          echo "=== Maker4 logs ==="
          docker compose logs maker4 --tail=100
          echo ""
          echo "=== Maker5 logs ==="
          docker compose logs maker5 --tail=100
          echo ""
          echo "=== jmwalletd logs ==="
          docker compose logs jmwalletd --tail=200
          echo ""
          echo "=== orderbook-watcher logs ==="
          docker compose logs orderbook-watcher --tail=100

      - name: Cleanup
        if: always()
        run: docker compose --profile e2e down -v

      - uses: actions/upload-artifact@v7
        with:
          name: tumbler-results
          path: |
            junit/test-results.xml
            coverage.xml
        if: always()

  test-playwright:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      MAKER_IMAGE: ghcr.io/${{ github.repository }}/maker:ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
      DIRECTORY_SERVER_IMAGE: ghcr.io/${{ github.repository }}/directory-server:ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha }}
      JM_NG_REPO: ${{ github.server_url }}/${{ github.event.pull_request.head.repo.full_name || github.repository }}
      JM_NG_REPO_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Pinned below 24.16.0: that release introduced a regression that
          # hangs `playwright install` forever during ZIP extraction (yauzl),
          # right after the download bar reaches 100%. Our pinned Playwright
          # (1.58.2) does not yet ship the fix, so the install step ate the
          # whole job budget. See microsoft/playwright#40724 and #41000.
          # Bump once Playwright releases the yauzl fix.
          node-version: "24.15.0"

      # Cache the downloaded Playwright browsers (Chrome, Chrome Headless
      # Shell, FFmpeg) keyed on the locked Playwright version. Caching skips
      # the download on cache hits; the bounded install step below is a safety
      # net for genuine CDN flakiness on a cache miss.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/playwright/package-lock.json') }}

      - name: Install npm dependencies
        working-directory: tests/playwright
        run: npm ci

      # Bounded so a flaky CDN download fails this step within minutes instead
      # of hanging until the job-level 30m timeout cancels it. The previous
      # "download hangs at 100%" failures were a Node 24.16.0 ZIP-extraction
      # regression, not a network stall, and are fixed by the Node pin above
      # (microsoft/playwright#40724); the retry only guards real CDN hiccups.
      - name: Install Playwright browsers
        working-directory: tests/playwright
        timeout-minutes: 10
        run: |
          # On a cache hit the binaries already exist; install is then a
          # fast no-op validation. On a miss this downloads Chrome, the
          # Chrome Headless Shell and FFmpeg from cdn.playwright.dev. Wrap
          # each attempt in a hard per-attempt timeout and retry so a single
          # stalled connection does not hang the whole job; the partial cache
          # dir is reused across attempts.
          for attempt in 1 2 3; do
            echo "Playwright browser install attempt ${attempt}..."
            if timeout 240 npx playwright install chromium; then
              echo "Playwright browsers installed."
              exit 0
            fi
            echo "Attempt ${attempt} failed or timed out; retrying..."
            sleep 5
          done
          echo "Playwright browser install failed after 3 attempts." >&2
          exit 1


      - name: Install Playwright OS dependencies
        working-directory: tests/playwright
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # Install OS-level system dependencies for Chromium. playwright
          # install-deps calls apt-get internally via sudo; we pass
          # DEBIAN_FRONTEND=noninteractive explicitly through sudo env so it
          # is not dropped by sudo's env_reset policy.
          sudo env DEBIAN_FRONTEND=noninteractive npx playwright install-deps chromium

      # Orderbook watcher frontend tests: self-contained (each spec serves the
      # real static frontend plus a fixture orderbook.json from an in-process
      # HTTP server), so they run before the Docker E2E stack is brought up.
      - name: Run orderbook watcher frontend tests
        working-directory: tests/playwright
        env:
          CI: "true"
        run: npx playwright test -c playwright.obwatcher.config.ts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built images
        run: |
          docker pull $MAKER_IMAGE &
          docker pull $DIRECTORY_SERVER_IMAGE &
          wait

      - name: Build JAM standalone image
        run: docker compose build jam-playwright

      - name: Start e2e services
        run: |
          docker compose --profile e2e up -d

          .github/scripts/wait-for-service.sh "Bitcoin" \
            "docker compose exec -T bitcoin bitcoin-cli -chain=regtest -rpcport=18443 -rpcuser=test -rpcpassword=test getblockchaininfo" \
            60 1

          .github/scripts/wait-for-service.sh "Directory Server" \
            "nc -z localhost 5222" \
            30 1

          .github/scripts/wait-for-service.sh "jam-playwright" \
            "curl -sf http://127.0.0.1:29183/api/v1/session" \
            90 2

          # Wait for at least 4 maker offers to appear in the orderbook so
          # that the collaborative-send playwright test (which requires the
          # JAM minimum of 4 collaborators) does not race maker startup.
          .github/scripts/wait-for-service.sh "Orderbook offers (>=4)" \
            "curl -sf http://127.0.0.1:8080/orderbook.json | python3 -c 'import sys,json; sys.exit(0 if len(json.load(sys.stdin).get(\"offers\", [])) >= 4 else 1)'" \
            120 2

          echo "E2E services ready!"

      - name: Run Playwright tests
        working-directory: tests/playwright
        env:
          CI: "true"
          JAM_URL: http://localhost:29183
          JMWALLETD_URL: http://localhost:29183
        run: npx playwright test

      - name: Show Docker logs on failure
        if: failure()
        run: |
          docker compose --profile e2e ps
          docker compose --profile e2e logs --tail=200

      - name: Cleanup Docker services
        if: always()
        run: docker compose --profile e2e down -v

      - name: Upload Playwright report and videos
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            tests/playwright/playwright-report/
            tests/playwright/test-results/
          retention-days: 14
        if: always()

