        run: |
          pip install \
            autobahn==22.7.1 \
            twisted==22.10.0 \
            mnemonic==0.20 \
            pyjwt==2.4.0 \
            klein \
            werkzeug

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built images
        run: |
          docker pull $DIRECTORY_SERVER_IMAGE
          docker pull $ORDERBOOK_WATCHER_IMAGE
          docker pull $MAKER_IMAGE
          docker pull $TAKER_IMAGE

      - name: "Start reference + neutrino services"
        env:
          TOR_HS_ED25519_SECRET_KEY_BASE64: ${{ secrets.TOR_HS_ED25519_SECRET_KEY_BASE64 }}
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: |
          docker compose --profile reference --profile neutrino up -d

          echo "Waiting for Bitcoin..."
          for i in {1..60}; do
            if docker compose exec -T bitcoin bitcoin-cli -chain=regtest \
                -rpcport=18443 -rpcuser=test -rpcpassword=test getblockchaininfo 2>/dev/null; then
              echo "Bitcoin ready"
              break
