name: Auto-retry failed jobs

# GitHub Actions has no native per-job retry. This workflow listens for the
# completion of the CI and Release workflows and, if the run failed, re-runs
# only the failed jobs exactly once. The retry is gated on run_attempt == 1 so
# a still-failing retry is not retried again (which would loop forever).
on:
  workflow_run:
    workflows:
      - CI
      - Release
    types:
      - completed

permissions:
  contents: read
  # Required by `gh run rerun` to re-run jobs.
  actions: write

jobs:
  rerun-failed:
    # Only act on genuine failures of the first attempt. Successful,
    # cancelled, or skipped runs are ignored, and a failed retry (attempt >= 2)
    # is left alone so it does not retry indefinitely.
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Re-run failed jobs once
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          echo "Re-running failed jobs for '${WORKFLOW_NAME}' run ${RUN_ID} (attempt 1)."
          gh run rerun "${RUN_ID}" --failed
